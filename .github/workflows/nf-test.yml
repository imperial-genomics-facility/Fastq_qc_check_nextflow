name: nf-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: nf-core/setup-nextflow@v2

      - uses: nf-core/setup-nf-test@v1

      - name: Run nf-test
        run: nf-test test --ci
